name: Instagram Auto-Post

on:
  schedule:
    # Täglich um 09:00 UTC (= 10:00 / 11:00 deutsche Zeit)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Auch manuell auslösbar über GitHub → Actions → "Run workflow"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # damit schedule.json (Status-Update) committed werden kann

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post veröffentlichen
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID:   ${{ secrets.IG_ACCOUNT_ID }}
        run: node social/instagram/post.mjs

      - name: Status-Update committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social/instagram/schedule.json
          git diff --staged --quiet || git commit -m "chore: Instagram Post Status aktualisiert"
          git push
